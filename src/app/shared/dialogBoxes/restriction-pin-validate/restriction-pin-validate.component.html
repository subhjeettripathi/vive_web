<div fxLayout="column" fxLayoutGap="10px">
    <div class="parental-control-content">
        <div class="alt-login-img">
            <img src="assets/svgs/altbalaji_logo.svg" alt="vive" class="vive-img">
        </div>
        <button class="close-btn">
            <mat-icon (click)="close()" >close</mat-icon>
        </button>
     

        <div class="parental-heading-1" >
            <p>
                Enter your parental lock PIN
             </p>
              <p style="color: #FF8787 !important;" *ngIf="showInvalid">Please Enter a valid Pin</p>
            <div>
              
                <form>

                    <ng-otp-input class="restriction-pin-validate" type="tel" inputmode="numeric" #ngOtpInput [formCtrl]="otpInputCurrent" (onInputChange)="onOtpChange($event)"
                        [config]="config"></ng-otp-input>
                     <br>
                        <button mat-button (click)="submit()" class="submitBtn">SUBMIT</button>
                </form>

            </div>

        </div>
      

    </div>

 
</div>
