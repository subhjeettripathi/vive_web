<div fxLayout="column" fxLayoutGap="10px">
    <div class="alt-login-content">
        <div class="alt-login-img">
            <img src="https://static.creatorott.com/configration/5006/5006_68c8fd27e9291.png" alt="vive">
        </div>
        <button (click)="onNoClick()" class="close-btn">
            <img src="assets/arrows_icons/VectorClose.svg" alt="">
        </button>
        <div class="text-white mb-2">Paytm has sent an OTP on your number  </div><br>
        
        <ng-otp-input class="paytm-otp" type="tel" inputmode="numeric" #ngOtpInput [formCtrl]="otpInput" (onInputChange)="onOtpChange($event)" [config]="config" >
        </ng-otp-input>
        <!-- <mat-error *ngIf="otpInput.invalid" class="mt-2" style="text-align: center !important;" >OTP is required
        </mat-error> -->
        <mat-error *ngIf="show && !otpInput.valid " class="mt-2" style="text-align:center !important;">OTP is required
        </mat-error>
        <mat-error *ngIf="!hide" class="mt-2" style="text-align: center !important;">Invalid OTP
        </mat-error>
        <div class="alt-m-4">
            <button type="submit" class="alt-btn-p alt-w-100" [disabled]="clicked" (click)="onVerifyOtp()">Submit</button>
        </div>
