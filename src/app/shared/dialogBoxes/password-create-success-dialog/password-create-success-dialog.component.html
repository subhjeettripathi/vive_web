<div class="alt-login-content">
    <div class="alt-login-img" *ngIf="baseJson.logo.is_allow">
        <img src="{{baseJson.logo.web}}" alt="vive" class="vive-img">
    </div>
    <h3 class="text-white verifyEmail " *ngIf="baseJson.heading.is_allow">{{baseJson.heading.text}}</h3>
    <hr>
    <button (click)="onNoClick()" class="close-btn">
        <img src="assets/arrows_icons/VectorClose.svg" alt="">
    </button>
   
   
<div class="">
    <div class="correct-img" *ngIf="baseJson.success_icon.is_allow">
        <img src="{{baseJson.success_icon.web}}" alt="vive" width="100%">
    </div>
<div>
    <p class="verificationCOde " *ngIf="baseJson.description.is_allow">{{baseJson.description.text}} </p>
</div>
<div class="alt-m-2 mb-3">
    <button type="submit" class="alt-btn-p alt-w-100" (click)="onNoClick()">OK

    </button>
</div>

<!-- <div class="alt-m-2 mb-3">
    <button type="submit" class="alt-btn-p alt-w-100" (click)="gotoCreatePassword()">Create New Password</button>
</div> -->
<div *ngIf="hideLoginForgot">


<div class="alt-m-2 mb-3" style=" display: flex; justify-content:center;
        " *ngIf="baseJson.submit_btn.is_allow">
            <button  (click)="gotoLoginPage()" type="submit"  class="alt-btn-p">{{baseJson.submit_btn.text}}</button>
        </div>
</div>
</div>
